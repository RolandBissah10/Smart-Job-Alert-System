services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: smart-job-alert-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SCHEDULER_INTERVAL_MINUTES
        value: 60
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend (React/Vite) ──────────────────────────────────────────
  - type: static
    name: smart-job-alert-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - source: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - source: /assets/*.js
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - source: /assets/*.css
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
